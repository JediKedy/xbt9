<!DOCTYPE html>
<html lang="az" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ── Primary Meta ─────────────────────────────────────────────── -->
    <title>XBT9</title>
    <meta name="theme-color" content="#4f46e5" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#4f46e5" media="(prefers-color-scheme: light)">

    <!-- ── PWA / Manifest ───────────────────────────────────────────── -->
    <link rel="manifest" href="manifest.json">

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TibbiXidmət">
    <link rel="apple-touch-icon" href="app-icon.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="app-icon.png">

    <!-- ── Styles & Fonts ───────────────────────────────────────────── -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        };
        // Prevent flash of wrong theme
        try {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
        } catch (_) {}
    </script>

    <style>
        .theme-transition { transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease; }
        .glass { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e4e4e7; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #27272a; }

        /* Modal transitions */
        #detailModal {
            transition: opacity 0.2s ease;
            pointer-events: none;
        }
        #detailModal.modal-open { pointer-events: auto; }
        #modalContent {
            transition: opacity 0.2s ease, transform 0.2s ease;
            opacity: 0;
            transform: scale(0.95);
        }
        #detailModal.modal-open #modalContent {
            opacity: 1;
            transform: scale(1);
        }

        /* Card focus style */
        .service-card:focus-visible {
            outline: 2px solid #6366f1;
            outline-offset: 2px;
        }

        /* Filter button active state */
        .filter-btn.active {
            background-color: #4f46e5 !important;
            color: white !important;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
        }
        .dark .filter-btn.active { background-color: #4f46e5 !important; }

        /* ── PWA Install Banner ──────────────────────────────────────── */
        #installBanner {
            transition: transform 0.35s cubic-bezier(.4,0,.2,1), opacity 0.35s ease;
        }
        #installBanner.banner-hidden {
            transform: translateY(100%);
            opacity: 0;
            pointer-events: none;
        }

        /* ── Update Toast ────────────────────────────────────────────── */
        #updateToast {
            transition: transform 0.35s cubic-bezier(.4,0,.2,1), opacity 0.35s ease;
        }
        #updateToast.toast-hidden {
            transform: translateY(-200%);
            opacity: 0;
            pointer-events: none;
        }

        /* ── Offline indicator ───────────────────────────────────────── */
        #offlineBadge {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        #offlineBadge.badge-hidden {
            opacity: 0;
            transform: translateY(-8px);
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen theme-transition">

    <!-- ── Offline Badge ─────────────────────────────────────────────────── -->
    <div id="offlineBadge"
         role="status"
         aria-live="polite"
         class="badge-hidden fixed top-20 left-1/2 -translate-x-1/2 z-[200] flex items-center gap-2 bg-amber-500 text-white text-xs font-bold px-4 py-2 rounded-full shadow-lg">
        <span>⚠</span> Offline rejim
    </div>

    <!-- ── Update Toast ──────────────────────────────────────────────────── -->
    <div id="updateToast"
         role="alert"
         aria-live="assertive"
         class="toast-hidden fixed top-20 left-1/2 -translate-x-1/2 z-[200] flex items-center gap-3 bg-indigo-600 text-white text-xs font-bold px-5 py-3 rounded-2xl shadow-xl whitespace-nowrap">
        <span>🔄 Yeni versiya mövcuddur</span>
        <button id="updateReloadBtn" class="underline underline-offset-2 hover:no-underline">Yenilə</button>
        <button id="updateDismissBtn" aria-label="Bağla" class="ml-1 opacity-70 hover:opacity-100">✕</button>
    </div>

    <!-- ── Navbar ────────────────────────────────────────────────────────── -->
    <nav class="fixed w-full top-0 z-50 bg-white/80 dark:bg-zinc-950/80 border-b border-zinc-200 dark:border-zinc-800 glass">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-indigo-600 animate-pulse" aria-hidden="true"></span>
                <h1 class="text-sm md:text-base font-bold tracking-tighter uppercase">
                    TİBBİ <span class="text-indigo-600 dark:text-indigo-400 font-normal lowercase">xidmətlər</span>
                </h1>
            </div>
            <div class="flex items-center gap-2">
                <!-- PWA Install button (hidden until prompt fires) -->
                <button
                    id="installBtn"
                    aria-label="Tətbiqi yüklə"
                    title="Tətbiqi quraşdır"
                    class="hidden w-10 h-10 items-center justify-center rounded-xl hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-colors border border-indigo-300 dark:border-indigo-700 text-indigo-600 dark:text-indigo-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/>
                    </svg>
                </button>
                <button
                    id="themeToggleBtn"
                    aria-label="Temanı dəyiş"
                    class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-900 transition-colors border border-zinc-200 dark:border-zinc-800">
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 pt-24 pb-32">

        <!-- Header + Search -->
        <div class="mb-8">
            <h2 class="text-3xl font-extrabold tracking-tight mb-2">Xidmətlər Zərfi</h2>
            <p id="resultCount" class="text-zinc-500 dark:text-zinc-400 text-sm font-medium mb-6 italic" aria-live="polite">Yüklənir...</p>

            <div class="relative">
                <label for="searchInput" class="sr-only">Xidmət axtar</label>
                <input
                    type="search"
                    id="searchInput"
                    autocomplete="off"
                    class="w-full pl-12 pr-10 py-4 rounded-2xl bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all text-sm shadow-sm"
                    placeholder="Xidmət adı, kod və ya XBT...">
                <div class="pointer-events-none absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <div id="searchSpinner" class="hidden absolute right-4 top-1/2 -translate-y-1/2" aria-hidden="true">
                    <div class="animate-spin h-4 w-4 border-2 border-indigo-600 border-t-transparent rounded-full"></div>
                </div>
            </div>
        </div>

        <!-- Category Filters -->
        <div id="categoryFilters" role="group" aria-label="Kateqoriya filtrlər"
            class="flex items-center gap-2 mb-8 overflow-x-auto pb-4 custom-scrollbar whitespace-nowrap -mx-4 px-4">
            <button
                id="btnAll"
                class="filter-btn active shrink-0 px-6 py-2.5 rounded-xl text-xs font-bold uppercase tracking-widest transition-all"
                data-catid="all"
                aria-pressed="true">
                Hamısı
            </button>
        </div>

        <!-- Cards Grid -->
        <div id="servicesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" role="list"></div>

        <!-- Initial Loader -->
        <div id="loader" class="py-32 text-center" role="status" aria-label="Yüklənir">
            <div class="inline-block animate-spin h-8 w-8 border-4 border-indigo-600 border-t-transparent rounded-full mb-4"></div>
            <p class="text-zinc-400 font-bold text-xs uppercase tracking-widest">Məlumatlar emal edilir...</p>
        </div>

    </main>

    <!-- ── PWA Install Banner (bottom sheet) ─────────────────────────────── -->
    <div id="installBanner"
         role="dialog"
         aria-label="Tətbiqi quraşdır"
         class="banner-hidden fixed bottom-0 inset-x-0 z-[150] p-4">
        <div class="max-w-lg mx-auto bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-3xl shadow-2xl shadow-indigo-500/10 p-6 flex items-center gap-4">
            <div class="shrink-0 w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-2xl shadow-lg shadow-indigo-600/30">⚕</div>
            <div class="flex-1 min-w-0">
                <p class="font-bold text-sm">İTS Portalını quraşdır</p>
                <p class="text-xs text-zinc-500 dark:text-zinc-400 mt-0.5">Offline istifadə üçün cihazınıza əlavə edin</p>
            </div>
            <div class="flex flex-col gap-2 shrink-0">
                <button id="installAcceptBtn"
                    class="bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white text-xs font-bold px-4 py-2 rounded-xl transition-all shadow-md shadow-indigo-600/20">
                    Quraşdır
                </button>
                <button id="installDismissBtn"
                    class="text-xs font-medium text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-300 py-1 transition-colors">
                    Sonra
                </button>
            </div>
        </div>
    </div>

    <!-- ── Detail Modal ───────────────────────────────────────────────────── -->
    <div
        id="detailModal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modalTitle"
        class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-zinc-950/60 backdrop-blur-sm opacity-0">

        <div id="modalContent" class="bg-white dark:bg-zinc-900 w-full max-w-lg rounded-[2rem] shadow-2xl overflow-hidden">
            <div class="p-8">
                <div class="flex justify-between items-start mb-6">
                    <div id="modalCategory" class="text-[10px] font-black uppercase tracking-[0.2em] text-indigo-600 bg-indigo-50 dark:bg-indigo-900/30 px-3 py-1.5 rounded-full"></div>
                    <button
                        id="modalCloseBtn"
                        aria-label="Bağla"
                        class="p-2 hover:bg-zinc-100 dark:hover:bg-zinc-800 rounded-full transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>

                <h3 id="modalTitle" class="text-xl md:text-2xl font-extrabold text-zinc-900 dark:text-zinc-100 leading-tight mb-8"></h3>

                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-zinc-50 dark:bg-zinc-800/50 p-4 rounded-2xl border border-zinc-100 dark:border-zinc-800">
                        <span class="text-[10px] uppercase text-zinc-400 block mb-1 font-bold">Xidmət Kodu</span>
                        <span id="modalCode" class="font-mono font-bold text-lg text-indigo-600 dark:text-indigo-400"></span>
                    </div>
                    <div class="bg-zinc-50 dark:bg-zinc-800/50 p-4 rounded-2xl border border-zinc-100 dark:border-zinc-800">
                        <span class="text-[10px] uppercase text-zinc-400 block mb-1 font-bold">XBT Kodu</span>
                        <span id="modalXBT" class="font-mono font-bold text-lg text-indigo-600 dark:text-indigo-400"></span>
                    </div>
                </div>

                <div class="flex items-center justify-between py-6 border-t border-zinc-100 dark:border-zinc-800">
                    <span class="text-zinc-500 font-medium">Xidmət qiyməti:</span>
                    <span id="modalPrice" class="text-3xl font-black text-indigo-600 dark:text-indigo-400"></span>
                </div>

                <button
                    id="modalCloseFooterBtn"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-indigo-600/20 active:scale-95">
                    Bağla
                </button>
            </div>
        </div>
    </div>

    <!-- ── Main Application Script ────────────────────────────────────────── -->
    <script>
    (() => {
        'use strict';

        // ── State ──────────────────────────────────────────────────────────
        let rawServices   = [];
        let categoriesMap = {};
        let activeCatId   = 'all';
        let debounceTimer = null;

        // ── SVG Icons ──────────────────────────────────────────────────────
        const ICON_PATHS = {
            bolt:              `<path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>`,
            home:              `<path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>`,
            beaker:            `<path stroke-linecap="round" stroke-linejoin="round" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>`,
            'user-group':      `<path stroke-linecap="round" stroke-linejoin="round" d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>`,
            variable:          `<path stroke-linecap="round" stroke-linejoin="round" d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>`,
            radio:             `<circle cx="12" cy="12" r="2"/><path stroke-linecap="round" stroke-linejoin="round" d="M16.24 7.76a6 6 0 010 8.48m-8.48 0a6 6 0 010-8.48"/>`,
            'building-office': `<path stroke-linecap="round" stroke-linejoin="round" d="M3 21h18M3 7V5a2 2 0 012-2h2m0 0V1h10v2m-10 0h10"/>`,
            scissors:          `<path stroke-linecap="round" stroke-linejoin="round" d="M6 19a3 3 0 102.17-5.17L10 12l-1.83-1.83A3 3 0 106 5m12 0a3 3 0 10-2.17 5.17L14 12l1.83 1.83A3 3 0 1018 19"/>`,
            sun:               `<path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"/>`,
            moon:              `<path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"/>`,
        };

        function icon(name, cls = 'w-4 h-4') {
            return `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="${cls}" aria-hidden="true">${ICON_PATHS[name] ?? ''}</svg>`;
        }

        function escapeText(str) {
            if (str == null) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // ── Theme ──────────────────────────────────────────────────────────
        function updateThemeIcon() {
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('themeToggleBtn').innerHTML =
                isDark ? icon('sun',  'w-5 h-5 text-yellow-400')
                       : icon('moon', 'w-5 h-5 text-zinc-600');
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            try { localStorage.theme = isDark ? 'dark' : 'light'; } catch (_) {}
            updateThemeIcon();
        }

        // ── Filter buttons ─────────────────────────────────────────────────
        function setActiveFilter(id) {
            activeCatId = id;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const isActive = btn.dataset.catid === id;
                btn.classList.toggle('active', isActive);
                btn.setAttribute('aria-pressed', String(isActive));
            });
            renderCards();
        }

        function renderFilters() {
            const container = document.getElementById('categoryFilters');
            const btnAll    = document.getElementById('btnAll');
            btnAll.setAttribute('aria-pressed', 'true');

            Object.entries(categoriesMap).forEach(([id, cat]) => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn shrink-0 px-5 py-2.5 rounded-xl text-[10px] font-bold uppercase tracking-widest bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 text-zinc-500 hover:border-indigo-500 transition-all theme-transition';
                btn.dataset.catid = id;
                btn.setAttribute('aria-pressed', 'false');
                btn.innerHTML = `<span class="flex items-center gap-2 pointer-events-none">${icon(cat.icon, 'w-3.5 h-3.5')} ${escapeText(cat.name)}</span>`;
                container.appendChild(btn);
            });

            container.addEventListener('click', e => {
                const btn = e.target.closest('.filter-btn');
                if (btn) setActiveFilter(btn.dataset.catid);
            });
        }

        // ── Search ─────────────────────────────────────────────────────────
        function handleSearchInput() {
            const spinner = document.getElementById('searchSpinner');
            spinner.classList.remove('hidden');
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                renderCards();
                spinner.classList.add('hidden');
            }, 300);
        }

        // ── Cards ──────────────────────────────────────────────────────────
        function buildCard(s, cat) {
            const card = document.createElement('div');
            card.className = 'service-card bg-white dark:bg-zinc-900 p-5 rounded-[1.5rem] border border-zinc-200 dark:border-zinc-800 cursor-pointer hover:shadow-xl hover:shadow-indigo-500/5 transition-all group active:scale-95 theme-transition';
            card.setAttribute('role', 'listitem');
            card.setAttribute('tabindex', '0');
            card.setAttribute('aria-label', escapeText(s.name));

            const priceDisplay = s.price ? `${escapeText(String(s.price))} ₼` : '—';

            card.innerHTML = `
                <div class="flex flex-col gap-4">
                    <div class="flex justify-between items-start">
                        <span class="text-[9px] font-black uppercase tracking-widest text-zinc-400 group-hover:text-indigo-600 transition-colors">Kod: ${escapeText(String(s.no))}</span>
                        <span class="text-xs font-bold text-indigo-600 bg-indigo-50 dark:bg-indigo-900/20 px-2 py-1 rounded-lg">${priceDisplay}</span>
                    </div>
                    <h4 class="font-bold text-sm text-zinc-800 dark:text-zinc-200 leading-tight min-h-[40px]">${escapeText(s.name)}</h4>
                    <div class="flex items-center gap-2 pt-2 border-t border-zinc-50 dark:border-zinc-800">
                        <div class="text-indigo-500">${icon(cat.icon, 'w-3 h-3')}</div>
                        <span class="text-[10px] font-bold uppercase tracking-wider text-zinc-500">${escapeText(cat.name)}</span>
                        <span class="ml-auto text-[10px] font-mono text-zinc-400">${escapeText(s.xbt ?? '')}</span>
                    </div>
                </div>`;

            const open = () => openModal(s, cat);
            card.addEventListener('click', open);
            card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); } });

            return card;
        }

        function renderCards() {
            const query       = document.getElementById('searchInput').value.toLowerCase().trim();
            const container   = document.getElementById('servicesContainer');
            const resultCount = document.getElementById('resultCount');

            const filtered = rawServices.filter(s => {
                const matchCat    = activeCatId === 'all' || String(s.cat_id) === activeCatId;
                const matchSearch = !query
                    || (s.name && s.name.toLowerCase().includes(query))
                    || (s.no   && String(s.no).includes(query))
                    || (s.xbt  && s.xbt.toLowerCase().includes(query));
                return matchCat && matchSearch;
            });

            resultCount.textContent = `${filtered.length} xidmət tapıldı`;

            const fragment = document.createDocumentFragment();

            if (filtered.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'col-span-full py-24 text-center text-zinc-400 italic';
                empty.textContent = 'Nəticə tapılmadı.';
                fragment.appendChild(empty);
            } else {
                filtered.forEach(s => {
                    const cat = categoriesMap[s.cat_id] ?? { name: 'Digər', icon: 'variable' };
                    fragment.appendChild(buildCard(s, cat));
                });
            }

            container.replaceChildren(fragment);
        }

        // ── Modal ──────────────────────────────────────────────────────────
        let lastFocusedElement = null;

        function openModal(service, category) {
            lastFocusedElement = document.activeElement;

            document.getElementById('modalTitle').textContent  = service.name ?? '';
            document.getElementById('modalCode').textContent   = service.no   ?? '';
            document.getElementById('modalXBT').textContent    = service.xbt  ?? 'Yoxdur';
            document.getElementById('modalPrice').textContent  = service.price ? `${service.price} ₼` : 'Tarifsiz';
            document.getElementById('modalCategory').innerHTML =
                `<span class="flex items-center gap-2">${icon(category.icon, 'w-4 h-4')} ${escapeText(category.name)}</span>`;

            const modal = document.getElementById('detailModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    modal.classList.add('modal-open');
                    modal.style.opacity = '1';
                });
            });

            document.getElementById('modalCloseBtn').focus();
        }

        function closeModal() {
            const modal = document.getElementById('detailModal');
            modal.classList.remove('modal-open');
            modal.style.opacity = '0';

            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                document.body.style.overflow = '';
                lastFocusedElement?.focus();
            }, 200);
        }

        // ── Event listeners ────────────────────────────────────────────────
        function attachListeners() {
            document.getElementById('themeToggleBtn').addEventListener('click', toggleDarkMode);
            document.getElementById('searchInput').addEventListener('input', handleSearchInput);
            document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
            document.getElementById('modalCloseFooterBtn').addEventListener('click', closeModal);
            document.getElementById('btnAll').addEventListener('click', () => setActiveFilter('all'));

            document.getElementById('detailModal').addEventListener('click', e => {
                if (e.target === e.currentTarget) closeModal();
            });

            document.addEventListener('keydown', e => {
                if (e.key === 'Escape') {
                    const modal = document.getElementById('detailModal');
                    if (!modal.classList.contains('hidden')) closeModal();
                }
            });
        }

        // ── Init ───────────────────────────────────────────────────────────
        async function init() {
            attachListeners();
            updateThemeIcon();

            try {
                const res = await fetch('xidmetler.json');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data  = await res.json();
                categoriesMap = data.categories ?? {};
                rawServices   = data.services   ?? [];
            } catch (err) {
                console.error('Data load failed:', err);
                document.getElementById('loader').innerHTML =
                    `<p class="text-red-500 font-bold">Məlumat faylı yüklənmədi.</p>`;
                return;
            }

            document.getElementById('loader').classList.add('hidden');
            renderFilters();
            renderCards();
        }

        init();
    })();
    </script>

    <!-- ── PWA Script ─────────────────────────────────────────────────────── -->
    <script>
    (() => {
        'use strict';

        // ── 1. Service Worker Registration ────────────────────────────────
        let swRegistration = null;

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', async () => {
                try {
                    swRegistration = await navigator.serviceWorker.register('./sw.js', { scope: './' });
                    console.log('[PWA] Service Worker registered, scope:', swRegistration.scope);

                    // Detect SW updates
                    swRegistration.addEventListener('updatefound', () => {
                        const newWorker = swRegistration.installing;
                        newWorker.addEventListener('statechange', () => {
                            // Only show toast when a new SW has taken over (not on first install)
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                showUpdateToast(newWorker);
                            }
                        });
                    });
                } catch (err) {
                    console.error('[PWA] Service Worker registration failed:', err);
                }
            });
        }

        // ── 2. Update Toast ────────────────────────────────────────────────
        function showUpdateToast(newWorker) {
            const toast = document.getElementById('updateToast');
            toast.classList.remove('toast-hidden');

            document.getElementById('updateReloadBtn').addEventListener('click', () => {
                newWorker.postMessage({ type: 'SKIP_WAITING' });
                navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
            }, { once: true });

            document.getElementById('updateDismissBtn').addEventListener('click', () => {
                toast.classList.add('toast-hidden');
            }, { once: true });
        }

        // ── 3. Offline / Online Badge ──────────────────────────────────────
        const badge = document.getElementById('offlineBadge');

        function syncNetworkStatus() {
            if (!navigator.onLine) {
                badge.classList.remove('badge-hidden');
            } else {
                badge.classList.add('badge-hidden');
            }
        }

        window.addEventListener('online',  syncNetworkStatus);
        window.addEventListener('offline', syncNetworkStatus);
        syncNetworkStatus(); // run once on load

        // ── 4. Install Prompt (beforeinstallprompt) ────────────────────────
        let deferredPrompt = null;
        const installBtn    = document.getElementById('installBtn');
        const installBanner = document.getElementById('installBanner');
        const acceptBtn     = document.getElementById('installAcceptBtn');
        const dismissBtn    = document.getElementById('installDismissBtn');

        // Don't show if user dismissed within the last 7 days
        function wasRecentlyDismissed() {
            try {
                const ts = localStorage.getItem('pwa-install-dismissed');
                return ts && (Date.now() - Number(ts)) < 7 * 24 * 60 * 60 * 1000;
            } catch { return false; }
        }

        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferredPrompt = e;

            if (wasRecentlyDismissed()) return;

            // Show both the navbar button and the bottom banner
            installBtn.classList.remove('hidden');
            installBtn.classList.add('flex');

            // Delay banner slightly for a nicer entrance after page load
            setTimeout(() => installBanner.classList.remove('banner-hidden'), 1500);
        });

        async function triggerInstall() {
            if (!deferredPrompt) return;
            hideBanner();
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log('[PWA] Install outcome:', outcome);
            deferredPrompt = null;
            if (outcome === 'accepted') {
                installBtn.classList.add('hidden');
            }
        }

        function hideBanner() {
            installBanner.classList.add('banner-hidden');
            try { localStorage.setItem('pwa-install-dismissed', String(Date.now())); } catch (_) {}
        }

        installBtn.addEventListener('click', triggerInstall);
        acceptBtn.addEventListener('click', triggerInstall);
        dismissBtn.addEventListener('click', hideBanner);

        // Hide install UI once the app is installed
        window.addEventListener('appinstalled', () => {
            console.log('[PWA] App installed!');
            installBtn.classList.add('hidden');
            installBanner.classList.add('banner-hidden');
            deferredPrompt = null;
        });

    })();
    </script>
