<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İTS Xidmətlər Siyahısı</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 30px; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .table thead { background-color: #007bff; color: white; }
        .category-badge { background-color: #e9ecef; color: #495057; padding: 5px 10px; border-radius: 20px; font-size: 0.85em; }
        #searchInput { border-radius: 25px; padding-left: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="mb-4 text-center text-primary">Tibbi Xidmətlər Siyahısı</h2>
    
    <input type="text" id="searchInput" class="form-control" placeholder="Xidmət adı və ya kod üzrə axtar...">

    <div class="table-responsive">
        <table class="table table-hover" id="servicesTable">
            <thead>
                <tr>
                    <th>Kod (No)</th>
                    <th>Xidmət Adı</th>
                    <th>Kateqoriya</th>
                    <th>Qiymət</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
    
    <div id="loader" class="text-center">
        <div class="spinner-border text-primary" role="status"></div>
        <p>Məlumatlar yüklənir...</p>
    </div>
</div>

<script>
    // JSON faylını oxuyan funksiya
    async function loadServices() {
        try {
            // Qeyd: Faylın adının 'xidmetler.json' olduğundan əmin olun
            const response = await fetch('xidmetler.json');
            const data = await response.json();
            
            const tableBody = document.getElementById('tableBody');
            const loader = document.getElementById('loader');
            
            loader.style.display = 'none'; // Yükləmə ikonunu gizlət

            data.forEach(item => {
                const row = document.createElement('tr');
                
                row.innerHTML = `
                    <td><strong>${item.no}</strong></td>
                    <td>${item.name}</td>
                    <td><span class="category-badge">${item.category.name}</span></td>
                    <td>${item.price ? item.price + ' AZN' : 'Pulsuz'}</td>
                `;
                
                tableBody.appendChild(row);
            });
        } catch (error) {
            console.error('Məlumat yüklənərkən xəta:', error);
            document.getElementById('loader').innerHTML = `<p class="text-danger">Xəta: JSON faylı tapılmadı və ya oxunmadı.</p>`;
        }
    }

    // Axtarış funksiyası
    document.getElementById('searchInput').addEventListener('keyup', function() {
        const filter = this.value.toLowerCase();
        const rows = document.querySelectorAll('#tableBody tr');

        rows.forEach(row => {
            const text = row.innerText.toLowerCase();
            row.style.display = text.includes(filter) ? '' : 'none';
        });
    });

    // Səhifə açılanda funksiyanı başlat
    loadServices();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
